name: Deploy NewYorkHUT Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: newyorkhut-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify canonical production configuration
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const configs = ['wrangler.json', 'wrangler.jsonc'];
          for (const file of configs) {
            const config = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (config.name !== 'newyorkhut') {
              throw new Error(`${file} has unexpected Worker name: ${config.name}`);
            }
            if (config.main !== 'src/index.js') {
              throw new Error(`${file} has unexpected entrypoint: ${config.main}`);
            }
          }
          console.log('Deploying Worker newyorkhut from src/index.js');
          NODE

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
