name: Deploy NewYorkHUT Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: newyorkhut-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SITE_URL: https://newyorkhut.com
      PROBE_URL: https://newyorkhut.com/__deploy_probe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify canonical production configuration and capture expected release
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const configs = ['wrangler.json', 'wrangler.jsonc'];
          for (const file of configs) {
            const config = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (config.name !== 'newyorkhut') {
              throw new Error(`${file} has unexpected Worker name: ${config.name}`);
            }
            if (config.main !== 'src/index.js') {
              throw new Error(`${file} has unexpected entrypoint: ${config.main}`);
            }
          }

          const entry = fs.readFileSync('src/index.js', 'utf8');
          const marker = entry.match(/const\s+DEPLOYMENT_MARKER\s*=\s*['"]([^'"]+)['"]/);
          const target = entry.match(/import\s+site\s+from\s+['"]\.\/(index-v\d+\.js)['"]/);
          const version = entry.match(/version:\s*['"]([^'"]+)['"]/);

          if (!marker) throw new Error('src/index.js is missing DEPLOYMENT_MARKER');
          if (!target) throw new Error('src/index.js is missing canonical version target import');
          if (!version) throw new Error('src/index.js is missing probe version');

          fs.appendFileSync(process.env.GITHUB_ENV, `EXPECTED_MARKER=${marker[1]}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `EXPECTED_TARGET=src/${target[1]}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `EXPECTED_VERSION=${version[1]}\n`);

          console.log(`Expected marker: ${marker[1]}`);
          console.log(`Expected target: src/${target[1]}`);
          console.log(`Expected version: ${version[1]}`);
          NODE

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify exact release is live on NewYorkHUT.com
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deployment-verification

          for attempt in $(seq 1 30); do
            echo "Production verification attempt ${attempt}/30"

            if curl --fail --silent --show-error --location \
              --connect-timeout 10 --max-time 30 \
              -H 'cache-control: no-cache' \
              "${PROBE_URL}?verify=${GITHUB_SHA}-${attempt}" \
              -o deployment-verification/probe.json; then

              if python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          data = json.loads(Path('deployment-verification/probe.json').read_text())
          expected = {
              'application': 'NewYorkHUT.com',
              'entrypoint': 'src/index.js',
              'version': os.environ['EXPECTED_VERSION'],
              'target': os.environ['EXPECTED_TARGET'],
              'deploymentMarker': os.environ['EXPECTED_MARKER'],
          }
          mismatches = {
              key: {'expected': value, 'actual': data.get(key)}
              for key, value in expected.items()
              if data.get(key) != value
          }
          if mismatches:
              print('Production does not yet match this deployment:', mismatches)
              raise SystemExit(1)
          print('Exact production release verified:', data)
          PY
              then
                echo "NewYorkHUT.com is serving the exact release from this commit."
                break
              fi
            fi

            if [[ "$attempt" -eq 30 ]]; then
              echo "Deployment command completed, but production never served the expected release."
              echo "Expected marker: $EXPECTED_MARKER"
              echo "Expected target: $EXPECTED_TARGET"
              echo "Expected version: $EXPECTED_VERSION"
              echo "Last production probe response:"
              cat deployment-verification/probe.json 2>/dev/null || true
              exit 1
            fi

            sleep 20
          done

      - name: Verify changed tool route when applicable
        shell: bash
        run: |
          set -euo pipefail
          if git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" | grep -Eq '^src/index-v[0-9]+\.js$'; then
            status=$(curl --silent --show-error --location \
              --output deployment-verification/tool-page.html \
              --write-out '%{http_code}' \
              --connect-timeout 10 --max-time 30 \
              -H 'cache-control: no-cache' \
              "${SITE_URL}/tools/hut-tax-estimator?verify=${GITHUB_SHA}")
            [[ "$status" == "200" ]] || {
              echo "HUT tax estimator returned HTTP $status"
              exit 1
            }
            grep -q 'Gross vehicle weight (GVW)' deployment-verification/tool-page.html || {
              echo 'The live HUT tax estimator does not contain the GVW field.'
              exit 1
            }
            grep -q 'Automatically selected tax rate' deployment-verification/tool-page.html || {
              echo 'The live HUT tax estimator does not contain the automatic rate result.'
              exit 1
            }
          fi

      - name: Write deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo '## NewYorkHUT.com deployment verification'
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Expected version: ${EXPECTED_VERSION:-not captured}"
            echo "- Expected target: ${EXPECTED_TARGET:-not captured}"
            echo "- Expected marker: ${EXPECTED_MARKER:-not captured}"
            echo "- Result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deployment diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newyorkhut-deployment-${{ github.run_id }}
          path: deployment-verification/
          if-no-files-found: ignore
          retention-days: 7
