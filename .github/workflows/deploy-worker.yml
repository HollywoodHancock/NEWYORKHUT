name: Deploy NewYorkHUT Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: newyorkhut-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify active Worker entry point
        run: |
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('wrangler.json','utf8')); if(c.main!=='src/index-v43.js'){throw new Error('Unexpected Worker entry point: '+c.main)} console.log('Deploying '+c.main)"

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
