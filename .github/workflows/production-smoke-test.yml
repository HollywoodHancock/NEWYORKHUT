name: Production Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: production-smoke-test
  cancel-in-progress: true

jobs:
  verify-production:
    name: Verify NewYorkHUT.com
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SITE_URL: https://newyorkhut.com
      PROBE_URL: https://newyorkhut.com/__deploy_probe
      FAILURE_ISSUE_TITLE: "Production smoke test failed"

    steps:
      - name: Wait for Cloudflare deployment and fetch production
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p smoke-test

          for attempt in $(seq 1 20); do
            echo "Production check attempt ${attempt}/20"
            if curl --fail --silent --show-error --location \
              --max-time 30 --connect-timeout 10 \
              --proto '=https' --tlsv1.2 \
              --dump-header smoke-test/headers.txt \
              --output smoke-test/homepage.html \
              "$SITE_URL"; then
              echo "Production homepage is reachable over HTTPS."
              break
            fi

            if [[ "$attempt" -eq 20 ]]; then
              echo "Production did not become reachable after 20 attempts."
              exit 1
            fi
            sleep 30
          done

      - name: Verify HTTP status, redirect, and TLS
        shell: bash
        run: |
          set -euo pipefail
          result=$(curl --silent --show-error --location \
            --output /dev/null \
            --write-out '%{http_code}|%{url_effective}|%{ssl_verify_result}' \
            --max-time 30 --connect-timeout 10 \
            --proto '=https' --tlsv1.2 \
            "$SITE_URL")

          IFS='|' read -r status final_url ssl_result <<< "$result"
          echo "HTTP status: $status"
          echo "Final URL: $final_url"
          echo "TLS verification result: $ssl_result"

          [[ "$status" == "200" ]] || { echo "Expected HTTP 200, received $status"; exit 1; }
          [[ "$ssl_result" == "0" ]] || { echo "TLS verification failed: $ssl_result"; exit 1; }
          [[ "$final_url" == https://newyorkhut.com/* || "$final_url" == https://www.newyorkhut.com/* ]] || {
            echo "Unexpected final URL: $final_url"
            exit 1
          }

      - name: Verify deployment probe JSON
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --max-time 30 --connect-timeout 10 \
            --proto '=https' --tlsv1.2 \
            --output smoke-test/deploy-probe.json \
            "$PROBE_URL"

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('smoke-test/deploy-probe.json')
          data = json.loads(path.read_text())

          required = {
              'application': 'NewYorkHUT.com',
              'entrypoint': 'src/index.js',
          }
          for key, expected in required.items():
              actual = data.get(key)
              if actual != expected:
                  raise SystemExit(f'Unexpected {key}: {actual!r}; expected {expected!r}')

          version = data.get('version', '')
          marker = data.get('deploymentMarker', '')
          target = data.get('target', '')

          if not isinstance(version, str) or not version.startswith('v'):
              raise SystemExit(f'Invalid version: {version!r}')
          if not isinstance(marker, str) or not marker.startswith(version):
              raise SystemExit(f'Invalid deployment marker: {marker!r}')
          if not isinstance(target, str) or not target.endswith('.js'):
              raise SystemExit(f'Invalid target: {target!r}')

          print(f'Deployment version: {version}')
          print(f'Deployment marker: {marker}')
          print(f'Target: {target}')
          PY

      - name: Verify rendered navigation
        shell: bash
        run: |
          set -euo pipefail

          if ! grep -Eiq '<header[^>]*(id|class)=["'"'][^"'"']*(nyh-global-header|nyh47-header|nyh-site-header)' smoke-test/homepage.html; then
            echo "The production homepage does not contain a rendered navigation header."
            grep -Ein 'nyh-global-header|nyh47-header|nyh-site-header|nyh-universal-nav' smoke-test/homepage.html || true
            exit 1
          fi

          if ! grep -Eiq '<nav[^>]*aria-label=["'"']Primary navigation["'"']' smoke-test/homepage.html; then
            echo "The production homepage does not contain an accessible primary navigation element."
            exit 1
          fi

          echo "Rendered primary navigation found."

      - name: Write smoke-test summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NewYorkHUT.com production smoke test"
            echo
            echo "- Site: $SITE_URL"
            echo "- Trigger: $GITHUB_EVENT_NAME"
            echo "- Commit: $GITHUB_SHA"
            echo "- Result: ${{ job.status }}"
            if [[ -f smoke-test/deploy-probe.json ]]; then
              python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('smoke-test/deploy-probe.json').read_text())
          print(f"- Deployment marker: {data.get('deploymentMarker', 'unknown')}")
          PY
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostic responses
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-test-${{ github.run_id }}
          path: smoke-test/
          if-no-files-found: ignore
          retention-days: 7

      - name: Open or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.FAILURE_ISSUE_TITLE;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The automated production smoke test failed.',
              '',
              `- Site: ${process.env.SITE_URL}`,
              `- Commit: ${context.sha}`,
              `- Trigger: ${context.eventName}`,
              `- Workflow run: ${runUrl}`,
              '',
              'The run includes the fetched homepage, headers, and deployment probe as diagnostic artifacts.'
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Smoke test failed again: ${runUrl}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['production']
              });
            }

      - name: Close resolved failure issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.FAILURE_ISSUE_TITLE;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Production smoke test passed on commit ${context.sha}. Closing this incident.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }
