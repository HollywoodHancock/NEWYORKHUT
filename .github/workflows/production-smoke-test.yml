name: Production Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: production-smoke-test
  cancel-in-progress: true

jobs:
  verify-production:
    name: Verify NewYorkHUT.com
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_URL: https://newyorkhut.com
      PROBE_URL: https://newyorkhut.com/__deploy_probe
      FAILURE_ISSUE_TITLE: Production smoke test failed

    steps:
      - name: Fetch production after Cloudflare deployment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p smoke-test/pages
          for attempt in $(seq 1 20); do
            echo "Production check attempt ${attempt}/20"
            if curl --fail --silent --show-error --location \
              --max-time 30 --connect-timeout 10 \
              --proto '=https' --tlsv1.2 \
              --dump-header smoke-test/headers.txt \
              --output smoke-test/homepage.html \
              "$SITE_URL"; then
              break
            fi
            [[ "$attempt" -lt 20 ]] || exit 1
            sleep 30
          done

      - name: Verify HTTP, redirect, and TLS
        shell: bash
        run: |
          set -euo pipefail
          result=$(curl --silent --show-error --location \
            --output /dev/null \
            --write-out '%{http_code}|%{url_effective}|%{ssl_verify_result}' \
            --max-time 30 --connect-timeout 10 \
            --proto '=https' --tlsv1.2 "$SITE_URL")
          IFS='|' read -r status final_url ssl_result <<< "$result"
          echo "HTTP status: $status"
          echo "Final URL: $final_url"
          echo "TLS result: $ssl_result"
          [[ "$status" == 200 ]]
          [[ "$ssl_result" == 0 ]]
          [[ "$final_url" == https://newyorkhut.com/* || "$final_url" == https://www.newyorkhut.com/* ]]

      - name: Verify deployment probe
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --max-time 30 --connect-timeout 10 \
            --proto '=https' --tlsv1.2 \
            --output smoke-test/deploy-probe.json "$PROBE_URL"
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('smoke-test/deploy-probe.json').read_text())
          assert data.get('application') == 'NewYorkHUT.com', data
          assert data.get('entrypoint') == 'src/index.js', data
          version = data.get('version', '')
          marker = data.get('deploymentMarker', '')
          target = data.get('target', '')
          assert isinstance(version, str) and version.startswith('v'), data
          assert isinstance(marker, str) and marker.startswith(version), data
          assert isinstance(target, str) and target.endswith('.js'), data
          print('Deployment marker:', marker)
          PY

      - name: Audit navigation on every public page
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          import ssl
          import urllib.request
          from pathlib import Path

          base = 'https://newyorkhut.com'
          paths = [
              '/', '/new-york-hut-guide', '/learn', '/ask-hut-ai', '/tools',
              '/tools/eligibility-checker', '/tools/permit-service-finder',
              '/tools/readiness-checklist', '/tools/hut-tax-estimator',
              '/tools/trip-cost-estimator', '/tools/weight-guide',
              '/tools/filing-deadlines', '/services', '/services/new-hut-permit',
              '/services/temporary-hut-permit', '/services/hut-renewal',
              '/services/add-a-vehicle', '/services/replacement-permit',
              '/services/account-update', '/what-is-hut',
              '/new-york-hut/do-i-need-new-york-hut',
              '/new-york-hut/new-york-hut-weight-threshold',
              '/new-york-hut/what-is-a-new-york-hut-trip-certificate',
              '/new-york-hut/vehicles-and-decals',
              '/new-york-hut/filing-and-taxes', '/new-york-hut/exemptions',
              '/new-york-hut/enforcement', '/site-map'
          ]

          report = []
          failures = []
          context = ssl.create_default_context()

          for index, path in enumerate(paths):
              url = base + path
              request = urllib.request.Request(url, headers={'User-Agent': 'NewYorkHUT-Smoke-Test/1.0'})
              try:
                  with urllib.request.urlopen(request, timeout=30, context=context) as response:
                      status = response.status
                      html = response.read().decode('utf-8', errors='replace')
              except Exception as exc:
                  failures.append(f'{path}: request failed: {exc}')
                  report.append(f'FAIL {path} request failed: {exc}')
                  continue

              filename = f'{index:02d}-' + (path.strip('/').replace('/', '-') or 'home') + '.html'
              Path('smoke-test/pages', filename).write_text(html)

              header = re.search(r'<header\b[^>]*(?:id=["\']nyh-global-header["\']|class=["\'][^"\']*\bnyh-global-header\b[^"\']*["\'])', html, re.I)
              nav = re.search(r'<nav\b[^>]*aria-label\s*=\s*["\']Primary navigation["\']', html, re.I)
              buttons = re.findall(r'<nav\b[^>]*aria-label\s*=\s*["\']Primary navigation["\'][^>]*>[\s\S]*?</nav>', html, re.I)
              expected_links = ['/learn', '/new-york-hut-guide', '/tools', '/services', '/ask-hut-ai', '/site-map']
              missing_links = [link for link in expected_links if not buttons or f'href="{link}"' not in buttons[0]]

              problems = []
              if status != 200: problems.append(f'HTTP {status}')
              if not header: problems.append('missing universal header')
              if not nav: problems.append('missing primary navigation')
              if missing_links: problems.append('missing links: ' + ', '.join(missing_links))

              if problems:
                  message = f'{path}: ' + '; '.join(problems)
                  failures.append(message)
                  report.append('FAIL ' + message)
              else:
                  report.append('PASS ' + path)

          Path('smoke-test/navigation-audit.txt').write_text('\n'.join(report) + '\n')
          print('\n'.join(report))
          if failures:
              raise SystemExit('Navigation audit failed:\n' + '\n'.join(failures))
          PY

      - name: Write summary
        if: always()
        shell: bash
        run: |
          echo "## NewYorkHUT.com production smoke test" >> "$GITHUB_STEP_SUMMARY"
          echo "- Site: $SITE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f smoke-test/navigation-audit.txt ]]; then
            echo "- Public routes audited: $(wc -l < smoke-test/navigation-audit.txt)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-test-${{ github.run_id }}
          path: smoke-test/
          if-no-files-found: ignore
          retention-days: 7

      - name: Open or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.FAILURE_ISSUE_TITLE;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The automated production smoke test failed.', '',
              `- Site: ${process.env.SITE_URL}`,
              `- Commit: ${context.sha}`,
              `- Trigger: ${context.eventName}`,
              `- Workflow run: ${runUrl}`, '',
              'The workflow audits navigation across every public route. Diagnostic HTML and the route report are attached to the run.'
            ].join('\n');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100
            });
            const existing = issues.find(i => !i.pull_request && i.title === title);
            if (existing) {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body});
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: `Smoke test failed again: ${runUrl}`});
            } else {
              await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['production']});
            }

      - name: Close resolved failure issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.FAILURE_ISSUE_TITLE;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100
            });
            const existing = issues.find(i => !i.pull_request && i.title === title);
            if (existing) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: `Production smoke test passed on commit ${context.sha}. Closing this incident.`});
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'closed', state_reason: 'completed'});
            }