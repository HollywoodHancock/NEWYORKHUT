name: Deploy NewYorkHUT Worker

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: newyorkhut-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate current Worker entrypoint
        run: npm run check

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc

      - name: Verify production deployment marker
        shell: bash
        run: |
          set -euo pipefail
          expected='v52-visible-navigation-buttons-2026-07-21-02'
          for attempt in {1..12}; do
            body=$(curl --silent --show-error --fail --max-time 15 https://newyorkhut.com/__deploy_probe || true)
            if echo "$body" | grep -q "$expected"; then
              echo "Production is serving $expected."
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Production did not report $expected after deployment."
              echo "$body"
              exit 1
            fi
            sleep 10
          done

      - name: Verify public navigation routes
        shell: bash
        run: |
          set -euo pipefail
          routes=(
            "/"
            "/learn"
            "/new-york-hut-guide"
            "/tools"
            "/services"
            "/ask-hut-ai"
            "/site-map"
          )
          for route in "${routes[@]}"; do
            status=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 15 "https://newyorkhut.com${route}")
            if [ "$status" != "200" ]; then
              echo "FAILED: ${route} returned HTTP ${status}"
              exit 1
            fi
            echo "VERIFIED: ${route} returned HTTP 200"
          done
